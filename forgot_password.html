<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account Recovery | AR Network House</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f2d5e;
    --navy-dark: #091e3f;
    --navy-mid: #1a4080;
    --sky: #3b9edd;
    --sky-light: #e8f4fd;
    --sky-mid: #bde0f7;
    --white: #ffffff;
    --slate: #64748b;
    --slate-light: #f1f5f9;
    --border: #cbd5e1;
    --error: #dc2626;
    --error-bg: #fef2f2;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(15,45,94,0.13);
    --transition: 0.2s ease;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(145deg, var(--navy-dark) 0%, var(--navy) 50%, #1a4a8a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(59,158,221,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(59,158,221,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--shadow), 0 0 0 1px rgba(59,158,221,0.12);
    overflow: hidden;
    position: relative;
  }

  .card-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    padding: 28px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo-wrap {
    background: rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.18);
  }

  .logo-wrap img {
    max-width: 120px;
    height: auto;
    display: block;
  }

  .header-text h2 {
    color: var(--white);
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    letter-spacing: -0.3px;
  }

  .header-text p {
    color: var(--sky-mid);
    font-size: 13px;
    text-align: center;
    margin-top: 4px;
  }

  .steps-indicator {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 8px;
  }

  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    transition: all var(--transition);
    flex-shrink: 0;
  }

  .step-dot.active {
    background: var(--sky);
    border-color: var(--sky);
    color: var(--white);
    box-shadow: 0 0 0 4px rgba(59,158,221,0.3);
  }

  .step-dot.done {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.4);
    color: var(--white);
  }

  .step-line {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.15);
    margin: 0 4px;
    transition: background var(--transition);
  }

  .step-line.done {
    background: rgba(255,255,255,0.35);
  }

  .card-body {
    padding: 28px 24px 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 12px;
    color: var(--slate);
    display: flex;
    align-items: center;
    pointer-events: none;
  }

  input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--navy-dark);
    background: var(--slate-light);
    transition: all var(--transition);
    outline: none;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--sky);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(59,158,221,0.15);
  }

  input::placeholder {
    color: #94a3b8;
    font-size: 14px;
  }

  input[type="password"] {
    letter-spacing: 0.1em;
  }

  input[type="password"]::placeholder {
    letter-spacing: normal;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    border: none;
    background: linear-gradient(135deg, var(--sky) 0%, #2080c0 100%);
    color: var(--white);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    letter-spacing: 0.1px;
    box-shadow: 0 3px 12px rgba(59,158,221,0.35);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, #2e92d4 0%, #1870af 100%);
    box-shadow: 0 4px 16px rgba(59,158,221,0.45);
    transform: translateY(-1px);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-primary svg {
    transition: transform var(--transition);
  }

  .btn-primary:hover svg {
    transform: translateX(2px);
  }

  .msg {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .msg.show { display: flex; }

  .msg.error {
    background: var(--error-bg);
    color: var(--error);
    border: 1px solid #fecaca;
  }

  .msg.success {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid #bbf7d0;
  }

  .back-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 18px;
    color: var(--slate);
    font-size: 13px;
    text-decoration: none;
    transition: color var(--transition);
  }

  .back-link:hover { color: var(--sky); }

  .hide { display: none !important; }

  .otp-hint {
    background: var(--sky-light);
    border: 1px solid var(--sky-mid);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    font-size: 13px;
    color: #1a5a8a;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 16px;
  }

  .password-strength {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 6px;
    overflow: hidden;
  }

  .strength-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease, background 0.3s ease;
    width: 0%;
  }

  .strength-label {
    font-size: 11px;
    color: var(--slate);
    margin-top: 4px;
    text-align: right;
    font-weight: 500;
  }

  .divider {
    height: 1px;
    background: #f1f5f9;
    margin: 4px 0 16px;
  }

  @media (max-width: 380px) {
    .card-body { padding: 22px 16px 20px; }
    .card-header { padding: 22px 16px 20px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo-wrap">
      <img src="https://github.com/arnetworkhouse-oss/ar-network-house/blob/main/ar%20logo.jpg?raw=true" alt="AR Network House">
    </div>
    <div class="header-text">
      <h2 id="title">Account Recovery</h2>
      <p id="subtitle">Verify your identity to reset password</p>
    </div>
    <div class="steps-indicator">
      <div class="step-dot active" id="sd1">1</div>
      <div class="step-line" id="sl1"></div>
      <div class="step-dot" id="sd2">2</div>
      <div class="step-line" id="sl2"></div>
      <div class="step-dot" id="sd3">3</div>
    </div>
  </div>

  <div class="card-body">

    <!-- STEP 1 -->
    <div id="step1">
      <div class="form-group">
        <label>Employee ID</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/><circle cx="12" cy="16" r="2"/></svg>
          </span>
          <input id="empId" type="text" placeholder="Enter your Employee ID" autocomplete="off" inputmode="text" />
        </div>
      </div>
      <button class="btn-primary" onclick="sendOTP()">
        Send OTP
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hide">
      <div class="otp-hint">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2080c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        OTP sent to your registered email. Check inbox or spam folder.
      </div>
      <div class="form-group">
        <label>6-Digit OTP</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input id="otp" type="number" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric" />
        </div>
      </div>
      <button class="btn-primary" onclick="verifyOTP()">
        Verify OTP
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="hide">
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input id="pass" type="password" placeholder="Minimum 8 characters" oninput="updateStrength(this.value)" />
        </div>
        <div class="password-strength"><div class="strength-bar" id="sbar"></div></div>
        <div class="strength-label" id="slabel"></div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </span>
          <input id="confirm" type="password" placeholder="Re-enter new password" />
        </div>
      </div>
      <button class="btn-primary" onclick="resetPassword()">
        Reset Password
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>

    <!-- Message -->
    <div id="msg" class="msg"></div>

    <!-- Back link only on step 1 -->
    <div id="backLinkWrap">
      <a class="back-link" href="https://arnetworkhouse-oss.github.io/ar-network-house/AR_EMPLOYEE.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Login
      </a>
    </div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxa53ytoeXIwotR_1YMwERA8cv5U96qoDS8DNbceciNpM3CWaCbKd10yKMi8PwyUSkt/exec";

function show(id) {
  ["step1","step2","step3"].forEach(s => document.getElementById(s).classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const dot = document.getElementById("sd"+i);
    dot.classList.remove("active","done");
    if(i < n) dot.classList.add("done");
    if(i === n) dot.classList.add("active");
  });
  [1,2].forEach(i => {
    const line = document.getElementById("sl"+i);
    line.classList.remove("done");
    if(i < n) line.classList.add("done");
  });
}

function message(text, type="") {
  const m = document.getElementById("msg");
  m.textContent = text;
  m.className = "msg " + (text ? "show " + type : "");
}

function updateStrength(val) {
  const bar = document.getElementById("sbar");
  const lbl = document.getElementById("slabel");
  let score = 0;
  if(val.length >= 8) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  const map = [
    {w:"0%",  bg:"#e2e8f0", t:""},
    {w:"25%", bg:"#ef4444", t:"Weak"},
    {w:"50%", bg:"#f97316", t:"Fair"},
    {w:"75%", bg:"#eab308", t:"Good"},
    {w:"100%",bg:"#16a34a", t:"Strong"},
  ];
  const m = map[score];
  bar.style.width = m.w;
  bar.style.background = m.bg;
  lbl.textContent = m.t;
  lbl.style.color = m.bg;
}

async function post(data) {
  const fd = new URLSearchParams();
  for(const k in data) { fd.append(k, data[k]); }
  const r = await fetch(API_URL, {method:"POST", body:fd});
  return r.json();
}

async function sendOTP() {
  const empId = document.getElementById("empId").value.trim();
  if(!empId) return message("Please enter your Employee ID","error");
  try {
    message("Sending OTP...","");
    const r = await post({action:"SEND_OTP", employeeId:empId});
    if(!r.success) throw r.message;
    show("step2");
    setStep(2);
    message("OTP sent to your registered email","success");
    document.getElementById("title").innerText = "Verify OTP";
    document.getElementById("subtitle").innerText = "Check your email inbox";
    document.getElementById("backLinkWrap").classList.add("hide");
  } catch(e) { message(e,"error"); }
}

async function verifyOTP() {
  const empId = document.getElementById("empId").value.trim();
  const otp = document.getElementById("otp").value.trim();
  if(!otp) return message("Please enter the OTP","error");
  try {
    message("Verifying...","");
    const r = await post({action:"VERIFY_OTP", employeeId:empId, otp});
    if(!r.success) throw r.message;
    show("step3");
    setStep(3);
    message("");
    document.getElementById("title").innerText = "Set New Password";
    document.getElementById("subtitle").innerText = "Create a strong password";
  } catch(e) { message(e,"error"); }
}

async function resetPassword() {
  const empId = document.getElementById("empId").value.trim();
  const p = document.getElementById("pass").value;
  const c = document.getElementById("confirm").value;
  if(p.length < 8) return message("Password must be at least 8 characters","error");
  if(p !== c) return message("Passwords do not match","error");
  try {
    message("Updating password...","");
    const r = await post({action:"RESET_PASSWORD", employeeId:empId, newPassword:p});
    if(!r.success) throw r.message;
    document.getElementById("title").innerText = "All Done!";
    document.getElementById("subtitle").innerText = "Redirecting to login...";
    message("Password updated successfully","success");
    setTimeout(() => location.href = "https://arnetworkhouse-oss.github.io/ar-network-house/AR_EMPLOYEE.html", 2000);
  } catch(e) { message(e,"error"); }
}
</script>
</body>
</html>
