<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  :root {
    --bg: #f7f8fc;
    --bg2: #ffffff;
    --bg3: #eef0f6;
    --border: rgba(30,40,80,0.10);
    --border2: rgba(30,40,80,0.20);
    --text: #1a1f3c;
    --muted: #6b7280;
    --accent: #1d4ed8;
    --accent2: #2563eb;
    --accent-light: #eff6ff;
    --danger: #dc2626;
    --success: #16a34a;
    --nav-bg: #1a1f3c;
    --radius: 12px;
    --font-head: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: none; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 2px 16px rgba(30,40,80,0.12); }
  .logo { font-family: var(--font-head); font-size: 1.4rem; color: #ffffff; letter-spacing: 0.02em; }
  .cart-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-size: 14px; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
  .cart-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); }
  .cart-count { background: #f59e0b; color: #000; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* CATALOG */
  #catalog-page { padding: 3rem 2rem; max-width: 1400px; margin: 0 auto; }
  .page-title { font-family: var(--font-head); font-size: 2.5rem; font-weight: 400; margin-bottom: 0.5rem; }
  .page-sub { color: var(--muted); margin-bottom: 2.5rem; font-size: 15px; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

  /* PRODUCT CARD */
  .product-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 4px rgba(30,40,80,0.06); }
  .product-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(29,78,216,0.12); }
  .card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--bg3); }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .product-card:hover .card-img-wrap img { transform: scale(1.04); }
  .card-body { padding: 16px; }
  .card-name { font-family: var(--font-head); font-size: 1.05rem; margin-bottom: 6px; color: var(--text); }
  .card-price { display: flex; align-items: baseline; gap: 8px; }
  .price-current { font-size: 1.1rem; font-weight: 500; color: var(--accent); }
  .price-original { font-size: 0.85rem; color: var(--muted); text-decoration: line-through; }
  .price-badge { background: #fef2f2; color: #dc2626; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; border: 1px solid #fecaca; }

  /* SKELETON */
  .skeleton { animation: shimmer 1.5s infinite; background: linear-gradient(90deg, #e8eaf0 25%, #f3f4f8 50%, #e8eaf0 75%); background-size: 200% 100%; border-radius: 8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* PRODUCT DETAIL */
  #detail-page { padding: 3rem 2rem; max-width: 1200px; margin: 0 auto; }
  .back-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-family: var(--font-body); font-size: 14px; display: flex; align-items: center; gap: 6px; margin-bottom: 2rem; transition: color 0.2s; padding: 0; }
  .back-btn:hover { color: var(--text); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
  @media(max-width:768px){ .detail-grid { grid-template-columns: 1fr; } }

  /* IMAGE GALLERY */
  .gallery { position: relative; }
  .main-img-wrap { aspect-ratio: 1; border-radius: var(--radius); overflow: hidden; background: var(--bg3); position: relative; border: 1px solid var(--border); }
  .main-img-wrap img, .main-img-wrap video { width: 100%; height: 100%; object-fit: cover; }
  .img-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg3); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .thumbnails { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .thumb { width: 64px; height: 64px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; flex-shrink: 0; background: var(--bg3); }
  .thumb.active { border-color: var(--accent); }
  .thumb img, .thumb video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .thumb-video-icon { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg3); font-size: 20px; color: var(--accent); }

  /* DETAIL INFO */
  .detail-info { display: flex; flex-direction: column; gap: 1.5rem; }
  .detail-name { font-family: var(--font-head); font-size: 2rem; font-weight: 600; line-height: 1.2; }
  .detail-price-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .detail-price { font-size: 1.8rem; color: var(--accent); font-weight: 500; }
  .detail-mrp { font-size: 1rem; color: var(--muted); text-decoration: line-through; }
  .discount-pill { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; }
  .savings-note { font-size: 13px; color: var(--success); font-weight: 500; }

  /* DESCRIPTION */
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 8px; }
  .description { font-size: 15px; line-height: 1.7; color: #374151; }

  /* SPECS TABLE */
  .specs-table { width: 100%; border-collapse: collapse; }
  .specs-table tr { border-bottom: 1px solid var(--border); }
  .specs-table tr:last-child { border-bottom: none; }
  .specs-table td { padding: 10px 4px; font-size: 14px; }
  .specs-table td:first-child { color: var(--muted); width: 45%; }

  /* BUY SECTION */
  .buy-section { background: var(--accent-light); border: 1px solid rgba(29,78,216,0.18); border-radius: var(--radius); padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; }
  .qty-wrap { display: flex; align-items: center; gap: 12px; }
  .qty-label { font-size: 14px; color: var(--muted); }
  .qty-ctrl { display: flex; align-items: center; gap: 0; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; background: #fff; }
  .qty-btn { background: none; border: none; color: var(--text); width: 36px; height: 36px; cursor: pointer; font-size: 18px; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
  .qty-btn:hover { background: var(--bg3); }
  .qty-val { width: 48px; text-align: center; font-size: 15px; font-weight: 500; border-left: 1px solid var(--border); border-right: 1px solid var(--border); height: 36px; display: flex; align-items: center; justify-content: center; color: var(--text); }
  .btn-buy { background: var(--accent); color: #fff; border: none; padding: 14px 24px; border-radius: 10px; font-family: var(--font-body); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.15s; box-shadow: 0 2px 8px rgba(29,78,216,0.25); }
  .btn-buy:hover { background: var(--accent2); transform: scale(1.01); }
  .btn-buy:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* CHECKOUT MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,20,50,0.55); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .modal-box { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(30,40,80,0.18); }
  .modal-title { font-family: var(--font-head); font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text); }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 500; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
  .form-input::placeholder { color: #9ca3af; }
  .order-summary-mini { background: var(--accent-light); border: 1px solid rgba(29,78,216,0.15); border-radius: 10px; padding: 14px; margin-bottom: 20px; font-size: 14px; display: flex; flex-direction: column; gap: 6px; }
  .summary-row { display: flex; justify-content: space-between; color: var(--text); }
  .summary-row.total { border-top: 1px solid rgba(29,78,216,0.2); padding-top: 8px; margin-top: 4px; font-weight: 500; font-size: 15px; color: var(--accent); }
  .btn-pay { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 10px; width: 100%; font-family: var(--font-body); font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 8px; box-shadow: 0 2px 8px rgba(29,78,216,0.25); }
  .btn-pay:hover { background: var(--accent2); }
  .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 10px; border-radius: 8px; width: 100%; font-family: var(--font-body); font-size: 14px; cursor: pointer; margin-top: 8px; transition: border-color 0.2s, color 0.2s; }
  .btn-cancel:hover { border-color: var(--text); color: var(--text); }

  /* SUCCESS */
  #success-page { padding: 4rem 2rem; text-align: center; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .success-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(92,184,92,0.15); border: 2px solid var(--success); display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .success-title { font-family: var(--font-head); font-size: 2rem; }
  .success-msg { color: var(--muted); font-size: 15px; line-height: 1.6; }
  .order-details-box { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 100%; text-align: left; display: flex; flex-direction: column; gap: 10px; font-size: 14px; box-shadow: 0 2px 12px rgba(30,40,80,0.07); }
  .order-details-box .row { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .order-details-box .row:last-child { border-bottom: none; padding-bottom: 0; }
  .order-details-box .row span:first-child { color: var(--muted); }
  .btn-home { background: none; border: 1px solid var(--border2); color: var(--text); padding: 12px 28px; border-radius: 10px; cursor: pointer; font-family: var(--font-body); font-size: 14px; transition: all 0.2s; }
  .btn-home:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* LOADING STATE */
  .loading-overlay { position: fixed; inset: 0; background: rgba(15,20,50,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .loading-text { color: #fff; font-size: 15px; }
  .big-spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* ERROR */
  .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 1rem 1.25rem; color: #dc2626; font-size: 14px; text-align: center; }
</style>
</head>
<body>

<nav>
  <div class="logo" id="store-name">Store</div>
  <button class="cart-btn" onclick="showCart()">
    🛒 Cart <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<!-- CATALOG PAGE -->
<div id="catalog-page" class="page active">
  <h1 class="page-title">Our Products</h1>
  <p class="page-sub">Tap any product to view details</p>
  <div class="products-grid" id="products-grid"></div>
</div>

<!-- DETAIL PAGE -->
<div id="detail-page" class="page">
  <button class="back-btn" onclick="showPage('catalog-page')">← Back to store</button>
  <div class="detail-grid">
    <div class="gallery">
      <div class="main-img-wrap" id="main-media-wrap">
        <div class="img-loading"><div class="spinner"></div></div>
      </div>
      <div class="thumbnails" id="thumbs"></div>
    </div>
    <div class="detail-info" id="detail-info"></div>
  </div>
</div>

<!-- SUCCESS PAGE -->
<div id="success-page" class="page">
  <div class="success-icon">✓</div>
  <h1 class="success-title">Order Placed!</h1>
  <p class="success-msg">Thank you for your purchase. A confirmation email has been sent to you.</p>
  <div class="order-details-box" id="order-details-box"></div>
  <button class="btn-home" onclick="showPage('catalog-page')">Continue Shopping</button>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkout-modal" style="display:none;">
  <div class="modal-box">
    <h2 class="modal-title">Checkout</h2>
    <div class="order-summary-mini" id="order-summary-mini"></div>
    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input class="form-input" id="c-name" placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input class="form-input" id="c-email" type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Phone *</label>
      <input class="form-input" id="c-phone" type="tel" placeholder="+91 98765 43210">
    </div>
    <div class="form-group">
      <label class="form-label">Shipping Address *</label>
      <textarea class="form-input" id="c-address" rows="3" placeholder="House no, Street, City, State, PIN"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Pincode *</label>
      <input class="form-input" id="c-pin" placeholder="700001">
    </div>
    <button class="btn-pay" id="pay-btn" onclick="initiatePayment()">Pay with Razorpay</button>
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading-overlay" style="display:none;">
  <div class="big-spinner"></div>
  <div class="loading-text" id="loading-text">Processing...</div>
</div>

<script>
// ============================================================
// ⚙️  CONFIG — FILL THESE IN
// ============================================================
const CONFIG = {
  // Single Google Apps Script Web App URL — serves products + logs orders + sends emails
  // See setup guide below
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzcgCmi5F1yQx_hih7i2N3-AO7dAlMpi3ZsXWyj3V9EYF8LRxs1vkjL7hui5VVrsT--/exec",

  // Razorpay Key ID (starts with rzp_test_ or rzp_live_)
  RAZORPAY_KEY: "YOUR_RAZORPAY_KEY_ID_HERE",

  // Store name shown in nav
  STORE_NAME: "My Store",

  // Currency
  CURRENCY: "INR",
  CURRENCY_SYMBOL: "₹"
};
// ============================================================

// ---- Sheet column mapping (1-based index, adjust if needed)
// Expected columns: id | images | description | specifications | price | discount_percent | product_name | video_url
const COL = { id:0, name:1, images:2, description:3, specs:4, price:5, discount:6, video:7 };
// ============================================================

let products = [];
let currentProduct = null;
let currentMediaIndex = 0;
let cart = [];
let qty = 1;

// INIT
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('store-name').textContent = CONFIG.STORE_NAME;
  loadProducts();
});

async function loadProducts() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = Array(6).fill(0).map(() => `
    <div style="border-radius:12px;overflow:hidden;border:1px solid rgba(30,40,80,0.10);background:#fff;box-shadow:0 1px 4px rgba(30,40,80,0.06)">
      <div class="skeleton" style="aspect-ratio:1;"></div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:10px;">
        <div class="skeleton" style="height:18px;border-radius:4px;width:70%;"></div>
        <div class="skeleton" style="height:14px;border-radius:4px;width:40%;"></div>
      </div>
    </div>`).join('');

  try {
    const resp = await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getProducts`);
    if(!resp.ok) throw new Error(resp.statusText);
    const json = await resp.json();
    if(json.error) throw new Error(json.error);
    products = parseSheetRows(json.rows || []);
    renderCatalog();
  } catch(e) {
    grid.innerHTML = `<div class="error-box" style="grid-column:1/-1;">Failed to load products. Check APPS_SCRIPT_URL in config.<br><small>${e.message}</small></div>`;
  }
}

function parseSheetRows(rows) {
  if(rows.length < 2) return [];
  const data = rows.slice(1).filter(r => r.some(c => c));
  return data.map(row => ({
    id: row[COL.id] || Math.random().toString(36).slice(2),
    name: row[COL.name] || 'Product',
    images: (row[COL.images] || '').split(/\n|\r/).map(s=>s.trim()).filter(Boolean),
    description: row[COL.description] || '',
    specs: row[COL.specs] || '',
    price: parseFloat(row[COL.price]) || 0,
    discount: parseFloat(row[COL.discount]) || 0,
    video: (row[COL.video] || '').trim()
  }));
}

function finalPrice(p) {
  return p.discount > 0 ? Math.round(p.price * (1 - p.discount/100)) : p.price;
}
function fmt(n) { return new Intl.NumberFormat('en-IN').format(n); }

function renderCatalog() {
  const grid = document.getElementById('products-grid');
  if(!products.length){ grid.innerHTML = '<div class="error-box" style="grid-column:1/-1;">No products found. Check sheet columns.</div>'; return; }
  grid.innerHTML = products.map(p => {
    const fp = finalPrice(p);
    const discHtml = p.discount > 0
      ? `<span class="price-original">${CONFIG.CURRENCY_SYMBOL}${fmt(p.price)}</span><span class="price-badge">${p.discount}% off</span>`
      : '';
    return `<div class="product-card" onclick="openProduct('${p.id}')">
      <div class="card-img-wrap">
        ${p.images[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:2rem;">📦</div>'}
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">
          <span class="price-current">${CONFIG.CURRENCY_SYMBOL}${fmt(fp)}</span>
          ${discHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openProduct(id) {
  currentProduct = products.find(p => p.id === id);
  if(!currentProduct) return;
  qty = 1;
  renderDetail();
  showPage('detail-page');
  window.scrollTo(0, 0);
}

function renderDetail() {
  const p = currentProduct;
  const fp = finalPrice(p);
  const savings = p.price - fp;
  const mediaItems = [...p.images.map(u=>({type:'img',url:u}))];
  if(p.video) mediaItems.push({type:'video',url:p.video});
  currentMediaIndex = 0;

  // Main media
  setMainMedia(mediaItems, 0);

  // Thumbs
  const thumbsEl = document.getElementById('thumbs');
  thumbsEl.innerHTML = mediaItems.map((m,i) => {
    if(m.type==='video') return `<div class="thumb ${i===0?'active':''}" onclick="setMainMedia(window.__media,${i})"><div class="thumb-video-icon">▶</div></div>`;
    return `<div class="thumb ${i===0?'active':''}" onclick="setMainMedia(window.__media,${i})"><img src="${m.url}" loading="lazy"></div>`;
  }).join('');
  window.__media = mediaItems;

  // Specs parse
  let specsHtml = '';
  if(p.specs) {
    const lines = p.specs.split(/\n|\r/).filter(Boolean);
    const rows = lines.map(l => {
      const sep = l.indexOf(':');
      if(sep > -1) return `<tr><td>${l.slice(0,sep).trim()}</td><td>${l.slice(sep+1).trim()}</td></tr>`;
      return `<tr><td colspan="2">${l}</td></tr>`;
    }).join('');
    specsHtml = `<div>
      <div class="section-label">Specifications</div>
      <table class="specs-table">${rows}</table>
    </div>`;
  }

  document.getElementById('detail-info').innerHTML = `
    <h1 class="detail-name">${p.name}</h1>
    <div class="detail-price-wrap">
      <span class="detail-price">${CONFIG.CURRENCY_SYMBOL}${fmt(fp)}</span>
      ${p.discount>0?`<span class="detail-mrp">${CONFIG.CURRENCY_SYMBOL}${fmt(p.price)}</span><span class="discount-pill">${p.discount}% off</span>`:''}
    </div>
    ${savings>0?`<div class="savings-note">You save ${CONFIG.CURRENCY_SYMBOL}${fmt(savings)}</div>`:''}
    ${p.description?`<div>
      <div class="section-label">Description</div>
      <div class="description">${p.description.replace(/\n/g,'<br>')}</div>
    </div>`:''}
    ${specsHtml}
    <div class="buy-section">
      <div class="qty-wrap">
        <span class="qty-label">Quantity</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <div class="qty-val" id="qty-display">1</div>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div style="font-size:14px;color:var(--muted)">Total: <span style="color:var(--accent);font-weight:500;" id="total-display">${CONFIG.CURRENCY_SYMBOL}${fmt(fp)}</span></div>
      <button class="btn-buy" onclick="openCheckout()">Buy Now</button>
    </div>`;
}

function setMainMedia(items, idx) {
  if(!items || !items[idx]) return;
  currentMediaIndex = idx;
  window.__media = items;
  const wrap = document.getElementById('main-media-wrap');
  wrap.innerHTML = '<div class="img-loading"><div class="spinner"></div></div>';
  const item = items[idx];
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  if(item.type === 'video') {
    const vid = document.createElement('video');
    vid.src = item.url; vid.controls = true; vid.autoplay = false;
    vid.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    vid.onloadeddata = () => { wrap.innerHTML = ''; wrap.appendChild(vid); };
    vid.onerror = () => { wrap.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#9ca3af;">Video unavailable</div>'; };
  } else {
    const img = new Image();
    img.src = item.url;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    img.onload = () => { wrap.innerHTML = ''; wrap.appendChild(img); };
    img.onerror = () => { wrap.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#9ca3af;">Image unavailable</div>'; };
  }
}

function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('qty-display').textContent = qty;
  const fp = finalPrice(currentProduct);
  document.getElementById('total-display').textContent = `${CONFIG.CURRENCY_SYMBOL}${fmt(fp * qty)}`;
}

function openCheckout() {
  const fp = finalPrice(currentProduct);
  const total = fp * qty;
  document.getElementById('order-summary-mini').innerHTML = `
    <div class="summary-row"><span>${currentProduct.name}</span><span>${CONFIG.CURRENCY_SYMBOL}${fmt(fp)} × ${qty}</span></div>
    <div class="summary-row total"><span>Total</span><span>${CONFIG.CURRENCY_SYMBOL}${fmt(total)}</span></div>`;
  document.getElementById('checkout-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }

function showLoading(msg='Processing...') { document.getElementById('loading-text').textContent = msg; document.getElementById('loading-overlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

async function initiatePayment() {
  const name = document.getElementById('c-name').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const address = document.getElementById('c-address').value.trim();
  const pin = document.getElementById('c-pin').value.trim();
  if(!name||!email||!phone||!address||!pin){ alert('Please fill all fields.'); return; }

  const fp = finalPrice(currentProduct);
  const total = fp * qty;
  const orderId = 'ORD-' + Date.now();
  const orderData = { orderId, name, email, phone, address, pin,
    product: currentProduct.name, productId: currentProduct.id,
    qty, priceEach: fp, total, currency: CONFIG.CURRENCY,
    date: new Date().toLocaleString('en-IN') };

  closeModal();

  const options = {
    key: CONFIG.RAZORPAY_KEY,
    amount: total * 100,
    currency: CONFIG.CURRENCY,
    name: CONFIG.STORE_NAME,
    description: currentProduct.name,
    order_id: '',   // optionally create server-side order_id
    prefill: { name, email, contact: phone },
    notes: { address },
    theme: { color: '#1d4ed8' },
    handler: async function(response) {
      showLoading('Confirming order...');
      orderData.razorpayPaymentId = response.razorpay_payment_id;
      orderData.razorpayOrderId = response.razorpay_order_id || '';
      await logOrder(orderData);
      await sendEmails(orderData);
      hideLoading();
      showSuccess(orderData);
    },
    modal: { ondismiss: function(){ hideLoading(); } }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

async function logOrder(d) {
  if(!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith('YOUR')) {
    console.warn('Apps Script URL not set — skipping order log + emails');
    return;
  }
  try {
    await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(d)
    });
  } catch(e){ console.error('Apps Script call failed', e); }
}

async function sendEmails(d) {
  // Emails handled by Apps Script — nothing to do here
}

function fmt(n) { return new Intl.NumberFormat('en-IN').format(n); }

function showSuccess(d) {
  document.getElementById('order-details-box').innerHTML = `
    <div class="row"><span>Order ID</span><span>${d.orderId}</span></div>
    <div class="row"><span>Payment ID</span><span>${d.razorpayPaymentId}</span></div>
    <div class="row"><span>Product</span><span>${d.product}</span></div>
    <div class="row"><span>Qty</span><span>${d.qty}</span></div>
    <div class="row"><span>Amount Paid</span><span style="color:var(--accent);">${CONFIG.CURRENCY_SYMBOL}${fmt(d.total)}</span></div>
    <div class="row"><span>Shipping to</span><span style="max-width:200px;text-align:right;">${d.address}, ${d.pin}</span></div>
    <div class="row"><span>Date</span><span>${d.date}</span></div>`;
  showPage('success-page');
  window.scrollTo(0,0);
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showCart() {
  if(!currentProduct) { alert('Browse products first!'); return; }
  openCheckout();
}
</script>

     if(sheet.getLastRow() === 0)
       sheet.appendRow(['Order ID','Date','Name','Email','Phone','Product','Qty','Total','Payment ID','Address','Pincode']);

     // Customer email

     });

     });

     return ContentService
       .createTextOutput(JSON.stringify({ status: "ok" }))
       .setMimeType(ContentService.MimeType.JSON);
